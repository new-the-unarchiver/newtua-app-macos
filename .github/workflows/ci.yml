name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'screenshots/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile ${{ matrix.arch }}
    # macos-26 carries the macOS 26.5 SDK this app targets. Note the runner
    # itself boots macOS 26.4, which is why nothing here *runs* the app —
    # see the "tests" note below.
    runs-on: macos-26
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]

    steps:
      - uses: actions/checkout@v4

      # 26.5 is the runner default today; select it explicitly when present so
      # a future default bump cannot silently change the toolchain, but do not
      # hard-fail if the path differs — any SDK >= 26.5 builds this app.
      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.5.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app
          fi
          xcodebuild -version
          xcrun --show-sdk-version --sdk macosx
          sw_vers

      # `build-for-testing` compiles the app *and* the test bundle, so a broken
      # test still fails CI even though we cannot execute it here.
      #
      # Why tests do not run: the app's deployment target is macOS 26.5 and the
      # runner boots 26.4, so xcodebuild refuses to launch the test host
      # ("My Mac's macOS 26.4 doesn't match ... deployment target"). GitHub has
      # no macOS 26.5 image. Until the runner image catches up — or the
      # deployment target is lowered — the suite is run locally before release.
      - name: Compile app and tests (${{ matrix.arch }})
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -project NewTheUnarchiver/NewTheUnarchiver.xcodeproj \
            -scheme NewTheUnarchiver \
            -configuration Debug \
            -destination "platform=macOS,arch=$ARCH" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM= \
            -quiet

      # The format registry drives four surfaces that can silently drift apart.
      # FormatRegistrySyncTests guards them at test time; this is the part we
      # can still check without running anything.
      - name: Check the format registry reaches both Info.plist files
        run: |
          set -euo pipefail
          APP=build/Build/Products/Debug/NewTheUnarchiver.app
          DOC=$(plutil -extract CFBundleDocumentTypes raw -o - "$APP/Contents/Info.plist")
          QL=$(plutil -extract NSExtension.NSExtensionAttributes.QLSupportedContentTypes raw -o - \
                 "$APP/Contents/PlugIns/NewTheUnarchiverQuickLook.appex/Contents/Info.plist")
          SWIFT=$(grep -c 'Format(utiIdentifier' \
                 NewTheUnarchiver/NewTheUnarchiver/Engine/SupportedFormats.swift)
          echo "registry: $SWIFT · document types: $DOC · Quick Look: $QL"
          [ "$DOC" = "$SWIFT" ] || { echo "::error::Info.plist declares $DOC types, registry has $SWIFT"; exit 1; }
          [ "$QL" = "$SWIFT" ] || { echo "::error::Quick Look declares $QL types, registry has $SWIFT"; exit 1; }
