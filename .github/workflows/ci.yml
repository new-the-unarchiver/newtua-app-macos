name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'screenshots/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile ${{ matrix.arch }}
    # macos-26 boots macOS 26.4 and ships the 26.5 SDK. The app targets 26.0,
    # so the runner can both build it and run its tests.
    runs-on: macos-26
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]

    steps:
      - uses: actions/checkout@v4

      # 26.5 is the runner default today; select it explicitly when present so
      # a future default bump cannot silently change the toolchain, but do not
      # hard-fail if the path differs — any SDK >= 26.0 builds this app.
      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.5.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app
          fi
          xcodebuild -version
          xcrun --show-sdk-version --sdk macosx
          sw_vers

      - name: Compile app and tests (${{ matrix.arch }})
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -project NewTheUnarchiver/NewTheUnarchiver.xcodeproj \
            -scheme NewTheUnarchiver \
            -configuration Debug \
            -destination "platform=macOS,arch=$ARCH" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM= \
            -quiet

      # Tests run on the runner's native architecture only. Executing the
      # x86_64 bundle here would go through Rosetta and prove nothing the
      # arm64 run does not; compiling it above is what catches Intel-only
      # breakage.
      #
      # Serial, with timeouts: several suites drive @MainActor state and real
      # extraction, and parallel execution makes them flaky (decisions.md).
      - name: Test
        if: matrix.arch == 'arm64'
        run: |
          set -euo pipefail
          xcodebuild test-without-building \
            -project NewTheUnarchiver/NewTheUnarchiver.xcodeproj \
            -scheme NewTheUnarchiver \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build \
            -only-testing:NewTheUnarchiverTests \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 30 \
            -maximum-test-execution-time-allowance 60 \
            -parallel-testing-enabled NO \
            -resultBundlePath TestResults.xcresult \
            -quiet

      - name: Test summary
        if: matrix.arch == 'arm64' && always()
        run: |
          xcrun xcresulttool get test-results summary \
            --path TestResults.xcresult 2>/dev/null \
            | grep -E '"(passedTests|failedTests|result)"' || true

      - name: Upload test results on failure
        if: matrix.arch == 'arm64' && failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
